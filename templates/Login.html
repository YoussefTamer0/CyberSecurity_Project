<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield AI — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:   #1a1d27;
    --bg2:  #1e2235;
    --bg3:  #232840;
    --border:  #2e3550;
    --border2: #3a4368;
    --accent:  #7aa2f7;
    --accent2: #73daca;
    --accent3: #f7768e;
    --accent4: #e0af68;
    --text:  #c0caf5;
    --text2: #a9b1d6;
    --text3: #565f89;
    --text4: #414868;
    --mono: 'JetBrains Mono', monospace;
    --ui:   'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Soft mesh background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 15%, rgba(122,162,247,.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 60% at 85% 85%, rgba(115,218,202,.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Subtle grid */
  .grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(122,162,247,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122,162,247,.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Corner brackets */
  .corner { position: fixed; width: 48px; height: 48px; pointer-events: none; z-index: 2; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); opacity: .4; }
  .corner::before { width: 2px; height: 100%; }
  .corner::after  { width: 100%; height: 2px; }
  .corner.tl { top: 24px; left: 24px; }
  .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
  .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
  .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

  .card {
    position: relative; z-index: 10; width: 420px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 40px;
    animation: cardIn .6s cubic-bezier(.16,1,.3,1);
    box-shadow: 0 32px 80px rgba(0,0,0,.4), 0 0 0 1px rgba(122,162,247,.05);
  }
  /* Top shimmer line */
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 40px; right: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(122,162,247,.5), rgba(115,218,202,.4), transparent);
    border-radius: 2px;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(.97)} to{opacity:1;transform:none} }

  .brand { text-align: center; margin-bottom: 36px; }
  .brand-icon {
    width: 64px; height: 64px; margin: 0 auto 16px;
    border: 1.5px solid rgba(122,162,247,.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(122,162,247,.15), inset 0 0 30px rgba(122,162,247,.06);
    animation: iconPulse 3s ease infinite;
    transition: all .3s;
  }
  @keyframes iconPulse { 0%,100%{box-shadow:0 0 30px rgba(122,162,247,.12),inset 0 0 20px rgba(122,162,247,.04)} 50%{box-shadow:0 0 50px rgba(122,162,247,.22),inset 0 0 30px rgba(122,162,247,.08)} }
  .brand-name { font-family: var(--ui); font-size: 20px; font-weight: 800; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 30px rgba(122,162,247,.3); }
  .brand-sub { font-size: 10px; color: var(--text3); letter-spacing: 1.5px; margin-top: 5px; text-transform: uppercase; }

  .form-group { margin-bottom: 18px; }
  label { display: flex; align-items: center; gap: 7px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
  .field-num { font-size: 9px; padding: 1px 6px; border: 1px solid var(--border); color: var(--text4); border-radius: 20px; font-family: var(--mono); }

  .input-wrap {
    position: relative; border: 1px solid var(--border);
    background: rgba(0,0,0,.25); border-radius: 7px;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(122,162,247,.1);
  }
  .input-wrap input {
    width: 100%; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--mono); font-size: 13.5px;
    padding: 12px 44px 12px 14px; border-radius: 7px;
  }
  .input-wrap input::placeholder { color: var(--text4); }
  .input-icon { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; transition: color .2s; }
  .input-wrap:focus-within .input-icon { color: var(--accent); }

  /* Password field */
  #pwd-container {
    position: relative; border: 1px solid var(--border);
    background: rgba(0,0,0,.25); border-radius: 7px; overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  #pwd-container:focus-within { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(115,218,202,.08); }
  #password {
    width: 100%; background: none; border: none; outline: none;
    color: transparent; caret-color: var(--accent2);
    font-family: var(--mono); font-size: 13.5px; padding: 12px 90px 12px 14px;
    position: relative; z-index: 2;
  }
  #password.revealed { color: var(--text); }
  #pwd-display {
    position: absolute; inset: 0; padding: 12px 90px 12px 14px;
    pointer-events: none; font-family: var(--mono); font-size: 13.5px;
    display: flex; align-items: center; gap: 2px; overflow: hidden; z-index: 1;
  }
  .pwd-char { display: inline-block; animation: charReveal .15s ease forwards; }
  @keyframes charReveal { 0%{opacity:0;transform:translateY(-5px) scale(.6)} 60%{transform:translateY(1px) scale(1.05)} 100%{opacity:1;transform:none} }
  .strength-bar { height: 2px; background: var(--border); overflow: hidden; }
  .strength-fill { height: 100%; width: 0%; transition: width .3s, background .3s; }

  .pwd-controls { position: absolute; right: 0; top: 0; bottom: 0; display: flex; align-items: center; z-index: 3; }
  #enc-status { font-size: 9px; letter-spacing: .5px; padding: 0 7px; color: var(--text3); transition: all .2s; white-space: nowrap; }
  #enc-status.active { color: var(--accent2); }

  #toggle-pwd {
    background: none; border: none; border-left: 1px solid var(--border);
    padding: 0 12px; height: 100%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3); transition: all .2s; position: relative; overflow: hidden;
  }
  #toggle-pwd:hover { background: rgba(122,162,247,.06); color: var(--accent); }
  #toggle-pwd.revealed { color: var(--accent2); border-left-color: rgba(115,218,202,.25); }

  #matrix-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: 0; transition: opacity .3s; }
  #matrix-canvas.active { opacity: .1; }

  .submit-btn {
    width: 100%; padding: 13px; background: transparent;
    border: 1px solid var(--accent); color: var(--accent);
    font-family: var(--ui); font-size: 15px; font-weight: 700;
    letter-spacing: 2px; cursor: pointer; position: relative;
    overflow: hidden; transition: color .3s, box-shadow .3s;
    margin-top: 10px; border-radius: 7px;
  }
  .submit-btn::before {
    content: ''; position: absolute; inset: 0;
    background: var(--accent); transform: translateX(-101%);
    transition: transform .35s cubic-bezier(.16,1,.3,1); z-index: -1;
  }
  .submit-btn:hover { color: var(--bg); box-shadow: 0 0 24px rgba(122,162,247,.3); }
  .submit-btn:hover::before { transform: translateX(0); }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

  .msg-box {
    padding: 10px 14px; border-radius: 6px; font-size: 12px;
    margin-bottom: 16px; display: none; animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1} }
  .msg-box.error   { background: rgba(247,118,142,.08); border: 1px solid rgba(247,118,142,.3); color: var(--accent3); display: block; }
  .msg-box.success { background: rgba(115,218,202,.08); border: 1px solid rgba(115,218,202,.3); color: var(--accent2); display: block; }

  .footer-links { text-align: center; margin-top: 24px; font-size: 12px; color: var(--text3); }
  .footer-links a { color: var(--accent); text-decoration: none; transition: color .15s; }
  .footer-links a:hover { color: var(--accent2); }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(122,162,247,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; vertical-align: middle; margin-right: 7px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }

  #enc-label { font-size: 9px; color: var(--text4); transition: color .3s; margin-left: 5px; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="card">
  <div class="brand">
    <div class="brand-icon" id="brand-icon">
      <svg id="lock-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7aa2f7" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path id="lock-shackle" d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="brand-name">CyberShield AI</div>
    <div class="brand-sub">Secure Access Terminal</div>
  </div>

  <div class="msg-box" id="msg-box"></div>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label><span class="field-num">01</span> Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="agent@cybershield.io" autocomplete="email" required>
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
    </div>

    <div class="form-group">
      <label><span class="field-num">02</span> Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="enter_username" autocomplete="username" required>
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    </div>

    <div class="form-group">
      <label>
        <span class="field-num">03</span> Password
        <span id="enc-label">[plaintext]</span>
      </label>
      <div id="pwd-container">
        <canvas id="matrix-canvas"></canvas>
        <div id="pwd-display"></div>
        <input type="password" id="password" placeholder="enter_password" autocomplete="current-password" required oninput="handlePasswordInput(this)">
        <div class="pwd-controls">
          <span id="enc-status">IDLE</span>
          <button type="button" id="toggle-pwd" onclick="togglePasswordVisibility()" title="Toggle visibility">
            <svg id="eye-open" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eye-closed" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">Authenticate</button>
  </form>

  <hr class="divider">
  <div class="footer-links">No account? <a href="Signup.html">Register new agent</a></div>
</div>

<script>
// ── Matrix rain
const matCanvas = document.getElementById('matrix-canvas');
const mCtx = matCanvas.getContext('2d');
const pwdContainer = document.getElementById('pwd-container');
function resizeMatrix() { matCanvas.width = pwdContainer.offsetWidth; matCanvas.height = pwdContainer.offsetHeight; }
resizeMatrix();
const chars = 'アイウエオ0123456789ABCDEF#$%@!';
const cols = Math.floor(matCanvas.width / 12);
const drops = Array(cols).fill(0);
function drawMatrix() {
  mCtx.fillStyle='rgba(26,29,39,.15)'; mCtx.fillRect(0,0,matCanvas.width,matCanvas.height);
  mCtx.fillStyle='#73daca'; mCtx.font='9px JetBrains Mono';
  drops.forEach((y,i) => { const char=chars[Math.floor(Math.random()*chars.length)]; mCtx.fillText(char,i*12,y*12); if(y*12>matCanvas.height&&Math.random()>.97)drops[i]=0; else drops[i]++; });
}
let matrixInterval=null;

const HEX_CHARS='0123456789ABCDEF';
function rHex() { return HEX_CHARS[Math.floor(Math.random()*16)]; }
let scrambleTimers=[];
let isRevealed=false;

function handlePasswordInput(input) {
  const val=input.value;
  const display=document.getElementById('pwd-display');
  const encStatus=document.getElementById('enc-status');
  const encLabel=document.getElementById('enc-label');
  const strengthFill=document.getElementById('strength-fill');

  if(val.length>0&&!matrixInterval&&!isRevealed){ matCanvas.classList.add('active'); matrixInterval=setInterval(drawMatrix,60); }
  else if(val.length===0){ matCanvas.classList.remove('active'); clearInterval(matrixInterval); matrixInterval=null; }

  if(val.length===0){ encStatus.textContent='IDLE'; encStatus.classList.remove('active'); encLabel.textContent='[plaintext]'; encLabel.style.color=''; }
  else { encStatus.textContent='AES-256'; encStatus.classList.add('active'); encLabel.textContent='[encrypting]'; encLabel.style.color='#73daca'; }

  if(!isRevealed){
    scrambleTimers.forEach(t=>clearTimeout(t)); scrambleTimers=[];
    display.innerHTML='';
    for(let i=0;i<val.length;i++){
      const span=document.createElement('span'); span.className='pwd-char';
      span.textContent=rHex();
      span.style.color=i===val.length-1?'#73daca':`hsl(${210+i*6},70%,65%)`;
      display.appendChild(span);
      let cycles=0;
      const scramble=setInterval(()=>{ if(cycles>=5){ clearInterval(scramble); span.textContent=rHex(); span.style.opacity='.8'; } else{ span.textContent=rHex(); cycles++; } },40);
      scrambleTimers.push(scramble);
    }
  }

  const strength=calcStrength(val);
  strengthFill.style.width=`${strength.pct}%`;
  strengthFill.style.background=strength.color;

  const lockIcon=document.getElementById('lock-icon');
  lockIcon.style.stroke='#73daca';
  setTimeout(()=>lockIcon.style.stroke='#7aa2f7',200);
}

function calcStrength(pwd){
  let s=0;
  if(pwd.length>=8)s++; if(pwd.length>=12)s++;
  if(/[A-Z]/.test(pwd))s++; if(/[a-z]/.test(pwd))s++;
  if(/\d/.test(pwd))s++; if(/[^A-Za-z0-9]/.test(pwd))s++;
  const colors=['#f7768e','#e0af68','#e0af68','#73daca','#7aa2f7'];
  return{pct:Math.min(s/6*100,100),color:colors[Math.min(Math.floor(s/6*5),4)]};
}

function togglePasswordVisibility(){
  const pwdInput=document.getElementById('password');
  const display=document.getElementById('pwd-display');
  const toggleBtn=document.getElementById('toggle-pwd');
  const eyeOpen=document.getElementById('eye-open');
  const eyeClosed=document.getElementById('eye-closed');
  const encLabel=document.getElementById('enc-label');
  isRevealed=!isRevealed;

  if(isRevealed){
    pwdInput.type='text'; pwdInput.classList.add('revealed'); display.style.display='none';
    toggleBtn.classList.add('revealed'); eyeOpen.style.display='none'; eyeClosed.style.display='block';
    encLabel.textContent='[revealed]'; encLabel.style.color='#e0af68';
    matCanvas.classList.remove('active'); clearInterval(matrixInterval); matrixInterval=null;
    scrambleTimers.forEach(t=>clearTimeout(t)); scrambleTimers=[];
  } else {
    pwdInput.type='password'; pwdInput.classList.remove('revealed'); display.style.display='flex';
    toggleBtn.classList.remove('revealed'); eyeOpen.style.display='block'; eyeClosed.style.display='none';
    if(pwdInput.value.length>0){ encLabel.textContent='[encrypting]'; encLabel.style.color='#73daca'; }
    else { encLabel.textContent='[plaintext]'; encLabel.style.color=''; }
    handlePasswordInput(pwdInput);
  }
}

async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('submit-btn');
  const msgBox=document.getElementById('msg-box');
  const email=document.getElementById('email').value.trim();
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Authenticating...';
  msgBox.className='msg-box';

  try{
    const res=await fetch('/api/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,username,password})
    });
    const data=await res.json();
    if(data.success){
      document.getElementById('brand-icon').style.boxShadow='0 0 50px rgba(115,218,202,.35)';
      document.getElementById('brand-icon').style.borderColor='rgba(115,218,202,.5)';
      document.getElementById('lock-icon').style.stroke='#73daca';
      msgBox.className='msg-box success';
      msgBox.textContent=`✓ Access granted — Welcome, ${data.username}`;
      btn.innerHTML='✓ Access Granted';
      btn.style.borderColor='#73daca'; btn.style.color='#73daca';
      setTimeout(()=>{ window.location.href='/'; },1200);
    } else {
      throw new Error(data.error||'Authentication failed');
    }
  } catch(err){
    const card=document.querySelector('.card');
    card.style.animation='shake .4s ease';
    setTimeout(()=>card.style.animation='',400);
    document.getElementById('brand-icon').style.boxShadow='0 0 40px rgba(247,118,142,.2)';
    document.getElementById('brand-icon').style.borderColor='rgba(247,118,142,.4)';
    setTimeout(()=>{ document.getElementById('brand-icon').style.borderColor=''; document.getElementById('brand-icon').style.boxShadow=''; },1200);
    msgBox.className='msg-box error';
    msgBox.textContent=`✕ ${err.message}`;
    btn.disabled=false; btn.innerHTML='Authenticate';
  }
}
</script>
</body>
</html>
